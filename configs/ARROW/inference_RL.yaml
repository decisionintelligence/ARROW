  weather_path: None # should be specified
  
  root_dir: ./dataset/
  val_lead_time: [72, 78, 84, 90, 120, 126, 132, 138, 168, 174, 180, 186, 216, 222, 228, 234, 240, 246, 252, 258, 336, 342, 348, 354]
